<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-title="chat.title">Chat</title>
    <link rel="icon" type="image/svg+xml" href="/assets/polaris-logo.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="lp-page">
    <div class="lp-app">
      <aside class="lp-sidebar">
        <a class="lp-brand" href="/dashboard.html" data-site-brand>
          <img data-site-icon alt="" />
          <span class="lp-brand-name" data-site-name>Polar-</span>
        </a>
        <nav class="lp-nav">
          <a class="lp-nav-item" href="/dashboard.html">
            <span class="lp-nav-icon">⊞</span><span>Dashboard</span>
          </a>
          <a class="lp-nav-item" href="/posts.html">
            <span class="lp-nav-icon">◎</span><span>Posts</span>
          </a>
          <a class="lp-nav-item" href="/markdowns.html">
            <span class="lp-nav-icon">◈</span><span>Markdowns</span>
          </a>
          <a class="lp-nav-item active" href="/chat.html">
            <span class="lp-nav-icon">◉</span><span>Chat</span>
          </a>
          <a class="lp-nav-item" href="/editor.html">
            <span class="lp-nav-icon">✎</span><span>Editor</span>
          </a>
          <a class="lp-nav-item" href="/latch.html" hidden data-admin-nav>
            <span class="lp-nav-icon">⚙</span><span>Latch</span>
          </a>
          <a class="lp-nav-item" href="/admin.html" hidden data-admin-nav>
            <span class="lp-nav-icon">☍</span><span>用户管理</span>
          </a>
        </nav>
        <div class="lp-sidebar-foot">
          <div class="lp-foot-avatar" id="lpFootAvatar">U</div>
          <div class="lp-foot-info">
            <div class="lp-foot-name" id="lpFootName">—</div>
            <div class="lp-foot-role" id="lpFootRole">—</div>
          </div>
        </div>
      </aside>

      <div class="lp-main" style="overflow:hidden;">
        <div class="lp-topbar">
          <span class="lp-topbar-title" data-i18n="chat.title">Chat</span>
          <div class="lp-topbar-end">
            <span id="chatWelcome" class="lp-mode-badge" data-i18n="chat.loading">Loading...</span>
            <a class="lp-topbar-back" href="/posts.html" data-i18n="chat.backToPosts">Posts</a>
            <a class="lp-topbar-back" href="/dashboard.html" data-i18n="chat.backToDashboard">Dashboard</a>
          </div>
        </div>

        <div class="lp-content" style="padding:0; overflow:hidden; flex:1; display:flex;">
          <div class="lp-chat-layout" style="height:100%;">
            <div class="lp-chat-list-panel">
              <div class="badge" data-i18n="chat.conversationList">Conversations</div>
              <div id="chatList" class="chat-list-body"></div>
            </div>

            <div class="lp-chat-thread-panel">
              <div class="chat-thread-header">
                <div>
                  <div id="chatTitle" class="chat-title" data-i18n="chat.selectConversation">Select a conversation</div>
                  <div id="chatSubtitle" class="chat-subtitle" data-i18n="chat.selectFromLeft">Select from left or navigate from a post</div>
                </div>
                <div class="inline-actions">
                  <button id="chatNewTopicBtn" class="btn-inline btn-secondary" type="button" hidden data-i18n="chat.newTopicBtn">New topic</button>
                  <button id="chatRenameTopicBtn" class="btn-inline btn-secondary" type="button" hidden data-i18n="chat.renameTopicBtn">Rename</button>
                  <button id="chatRefreshBtn" class="btn-inline btn-secondary" type="button" data-i18n="chat.refreshBtn">Refresh</button>
                </div>
              </div>
              <div id="chatThreadBar" class="chat-topic-bar" hidden>
                <label class="form-label chat-topic-label" for="chatThreadSelect" data-i18n="chat.currentTopic">Current topic</label>
                <div class="chat-topic-controls">
                  <select id="chatThreadSelect" class="input chat-topic-select"></select>
                </div>
                <div id="chatModelBar" class="chat-model-bar" hidden>
                  <div class="chat-model-copy">
                    <div class="chat-model-label" data-i18n="chat.currentModel">Current model</div>
                    <div id="chatModelCurrent" class="chat-model-current" data-i18n="chat.followDefaultConfig">Follow default config</div>
                  </div>
                  <div class="chat-model-controls">
                    <select id="chatModelSelect" class="input chat-model-select"></select>
                    <button id="chatSwitchModelBtn" class="btn-inline btn-secondary" type="button" data-i18n="chat.switchModel">Switch model</button>
                  </div>
                </div>
              </div>
              <div id="messageList" class="message-list"></div>
              <form id="messageForm" class="message-form">
                <label id="attachmentBtn" class="btn-inline btn-secondary message-attach-btn" title="Send attachment" data-i18n-title="chat.sendAttachment">
                  📎
                  <input id="attachmentInput" type="file" style="display:none" accept="image/*,video/*,application/*,text/*" />
                </label>
                <input id="messageInput" class="input message-input" type="text" data-i18n-placeholder="chat.messagePlaceholder" placeholder="Write something..." required />
                <button class="btn-inline btn-secondary" type="submit" data-i18n="chat.send">Send</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="/scripts/chat.js"></script>
  </body>
</html>
