<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-title="login.title">Login</title>
    <link rel="icon" type="image/svg+xml" href="/assets/polaris-logo.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="site-shell">
    <div class="page-shell-narrow">
      <a class="site-brand-banner" href="/" data-site-brand>
        <img class="site-brand-icon" data-site-icon alt="Site icon" />
        <div class="site-brand-copy">
          <div class="site-brand-name" data-site-name>Polar-</div>
          <div class="site-brand-description" data-site-description data-i18n="brand.loading">Loading site info...</div>
        </div>
      </a>

      <div class="card">
        <h1 data-i18n="login.welcome">Welcome back</h1>
        <p data-i18n="login.subtitle">Sign in with email and password</p>
        <div id="alert" class="alert"></div>
        <form id="loginForm">
          <label for="email" data-i18n="login.email">Email</label>
          <input id="email" name="email" type="email" required placeholder="you@example.com" />
          <label for="password" data-i18n="login.password">Password</label>
          <input id="password" name="password" type="password" required placeholder="••••••••" />
          <button type="submit" data-i18n="login.submit">Log in</button>
        </form>
        <button type="button" id="passkeyLoginBtn" class="btn-secondary" data-i18n="login.passkey">Log in with Passkey</button>
        <div id="passkeyStatus" class="status-text" data-i18n="login.passkeyHint">You need to bind a Passkey first</div>
        <a class="link" href="/register.html" data-i18n="login.noAccount">No account? Register</a>
      </div>
    </div>

    <script type="module" src="/scripts/login.js"></script>
  </body>
</html>
