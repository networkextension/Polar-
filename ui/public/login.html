<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录</title>
    <link rel="icon" type="image/svg+xml" href="/assets/polaris-logo.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="card">
      <h1>欢迎回来</h1>
      <p>使用邮箱和密码登录</p>
      <div id="alert" class="alert"></div>
      <form id="loginForm">
        <label for="email">邮箱</label>
        <input id="email" name="email" type="email" required placeholder="you@example.com" />
        <label for="password">密码</label>
        <input id="password" name="password" type="password" required placeholder="••••••••" />
        <button type="submit">登录</button>
      </form>
      <button type="button" id="passkeyLoginBtn" class="btn-secondary">使用 Passkey 登录</button>
      <div id="passkeyStatus" class="status-text">需要先在账户内绑定 Passkey</div>
      <a class="link" href="/register.html">没有账户？去注册</a>
    </div>

    <script>
      const API_BASE = "";
      const form = document.getElementById("loginForm");
      const alertBox = document.getElementById("alert");
      const passkeyLoginBtn = document.getElementById("passkeyLoginBtn");
      const passkeyStatus = document.getElementById("passkeyStatus");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        alertBox.className = "alert";
        alertBox.textContent = "";

        const payload = {
          email: form.email.value.trim(),
          password: form.password.value,
        };

        try {
          const res = await fetch(`${API_BASE}/api/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify(payload),
          });
          const data = await res.json();

          if (!res.ok) {
            alertBox.className = "alert error";
            alertBox.textContent = data.error || "登录失败";
            return;
          }

          alertBox.className = "alert success";
          alertBox.textContent = "登录成功，正在跳转...";
          setTimeout(() => {
            window.location.href = "/dashboard.html";
          }, 600);
        } catch (err) {
          alertBox.className = "alert error";
          alertBox.textContent = "网络错误，请稍后重试";
        }
      });

      passkeyLoginBtn.addEventListener("click", async () => {
        alertBox.className = "alert";
        alertBox.textContent = "";

        if (!window.PublicKeyCredential) {
          passkeyStatus.textContent = "当前浏览器不支持 Passkey。";
          return;
        }

        const email = form.email.value.trim();
        if (!email) {
          passkeyStatus.textContent = "请先输入邮箱地址。";
          return;
        }

        passkeyStatus.textContent = "正在启动 Passkey...";

        try {
          const beginRes = await fetch(`${API_BASE}/api/passkey/login/begin`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ email }),
          });
          const beginResult = await beginRes.json();

          if (!beginRes.ok) {
            passkeyStatus.textContent = beginResult.error || "无法发起 Passkey 登录";
            return;
          }

          const publicKey = beginResult.publicKey;
          publicKey.challenge = base64URLToBuffer(publicKey.challenge);
          if (publicKey.allowCredentials) {
            publicKey.allowCredentials = publicKey.allowCredentials.map((cred) => ({
              ...cred,
              id: base64URLToBuffer(cred.id),
            }));
          }

          const credential = await navigator.credentials.get({ publicKey });
          const payload = credentialToJSON(credential);

          const finishRes = await fetch(`${API_BASE}/api/passkey/login/finish`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-Passkey-Session": beginResult.session_id,
            },
            credentials: "include",
            body: JSON.stringify(payload),
          });
          const finishResult = await finishRes.json();

          if (finishRes.ok) {
            passkeyStatus.textContent = "Passkey 登录成功，正在跳转...";
            setTimeout(() => {
              window.location.href = "/dashboard.html";
            }, 600);
          } else {
            passkeyStatus.textContent = finishResult.error || "Passkey 登录失败";
          }
        } catch (err) {
          passkeyStatus.textContent = "网络错误，请稍后重试";
        }
      });

      function base64URLToBuffer(value) {
        const padding = "=".repeat((4 - (value.length % 4)) % 4);
        const base64 = (value + padding).replace(/-/g, "+").replace(/_/g, "/");
        const raw = atob(base64);
        const buffer = new Uint8Array(raw.length);
        for (let i = 0; i < raw.length; i++) {
          buffer[i] = raw.charCodeAt(i);
        }
        return buffer;
      }

      function bufferToBase64URL(buffer) {
        const bytes = new Uint8Array(buffer);
        let binary = "";
        for (let i = 0; i < bytes.byteLength; i++) {
          binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
      }

      function credentialToJSON(credential) {
        if (!credential) return null;
        const obj = {
          id: credential.id,
          rawId: bufferToBase64URL(credential.rawId),
          type: credential.type,
          response: {
            clientDataJSON: bufferToBase64URL(credential.response.clientDataJSON),
          },
        };

        if (credential.response.attestationObject) {
          obj.response.attestationObject = bufferToBase64URL(credential.response.attestationObject);
        }
        if (credential.response.authenticatorData) {
          obj.response.authenticatorData = bufferToBase64URL(credential.response.authenticatorData);
        }
        if (credential.response.signature) {
          obj.response.signature = bufferToBase64URL(credential.response.signature);
        }
        if (credential.response.userHandle) {
          obj.response.userHandle = bufferToBase64URL(credential.response.userHandle);
        }
        return obj;
      }

      async function redirectIfLoggedIn() {
        try {
          const res = await fetch("/api/me", { credentials: "include" });
          if (res.ok) {
            window.location.replace("/dashboard.html");
          }
        } catch (err) {
        }
      }

      redirectIfLoggedIn();
    </script>
  </body>
</html>
