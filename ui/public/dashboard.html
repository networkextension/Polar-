<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="dashboard">
      <div class="dashboard-header">
        <div>
          <h1>控制台</h1>
          <p id="welcomeText">正在加载用户信息...</p>
        </div>
        <div class="header-actions">
          <button id="drawerToggleBtn" class="btn-inline btn-secondary sidebar-toggle" type="button">记录列表</button>
          <button id="newEntryBtn" class="btn-inline btn-secondary" type="button">新建 Markdown</button>
        </div>
      </div>

      <div class="drawer-layout">
        <div id="drawerBackdrop" class="drawer-backdrop"></div>
        <aside id="entryDrawer" class="panel entry-drawer">
          <div class="drawer-header">
            <div class="badge">Markdown 记录</div>
            <button id="drawerCloseBtn" class="btn-inline btn-secondary drawer-close" type="button">收起</button>
          </div>
          <div class="drawer-body">
            <div class="group-card">
              <div class="badge">用户组</div>
              <div id="groupName" class="group-name">加载中...</div>
              <div id="groupMeta" class="group-meta"></div>
              <button id="addTagBtn" class="btn-secondary group-action-btn" type="button">添加 Tag</button>
            </div>
            <ul id="entryList" class="list"></ul>
            <button id="loadMoreBtn" class="btn-inline btn-secondary" type="button">加载更多</button>
            <div class="drawer-section drawer-history-section">
              <div class="badge">最近登录</div>
              <ul id="loginHistoryList" class="meta-list"></ul>
            </div>
          </div>
          <div class="drawer-footer">
            <div class="drawer-section">
              <div class="badge">外观</div>
              <p class="drawer-help">在默认风格和黑白样式之间切换。</p>
              <button id="themeToggleBtn" class="btn-secondary drawer-action-btn" type="button">切换到黑白样式</button>
            </div>
            <div class="drawer-section">
              <div class="badge">Passkey</div>
              <p class="drawer-help">绑定 Passkey 后可使用指纹或人脸快速登录。</p>
              <button id="passkeyRegisterBtn" class="btn-secondary drawer-action-btn" type="button">绑定 Passkey</button>
              <div id="passkeyStatus" class="status-text"></div>
            </div>
            <button id="logoutBtn" class="drawer-action-btn" type="button">退出登录</button>
          </div>
        </aside>
        <div class="panel drawer-main">
          <div class="badge">内容预览</div>
          <div id="entryContent" class="content-box">请选择侧边栏中的记录</div>
          <div class="toolbar" style="margin-top: 12px;">
            <button id="editBtn" class="btn-inline btn-secondary" type="button">编辑</button>
            <button id="deleteBtn" class="btn-inline" type="button">删除</button>
          </div>
        </div>
      </div>
    </div>

    <div id="tagModal" class="modal" aria-hidden="true">
      <div class="modal-backdrop"></div>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="tagModalTitle">
        <div class="modal-header">
          <h3 id="tagModalTitle">添加 Tag</h3>
          <button id="tagModalCloseBtn" class="btn-inline btn-secondary" type="button">关闭</button>
        </div>
        <form id="tagForm" class="modal-body">
          <label class="form-label" for="tagName">名称</label>
          <input id="tagName" class="input" type="text" required placeholder="例如：Go语言" />

          <label class="form-label" for="tagSlug">标识（可选）</label>
          <input id="tagSlug" class="input" type="text" placeholder="例如：golang" />

          <label class="form-label" for="tagDesc">描述（可选）</label>
          <textarea id="tagDesc" class="input textarea" rows="3" placeholder="简短描述"></textarea>

          <label class="form-label" for="tagOrder">排序（可选）</label>
          <input id="tagOrder" class="input" type="number" value="0" />

          <div id="tagFormStatus" class="status-text"></div>
          <div class="modal-actions">
            <button id="tagSubmitBtn" class="btn-secondary" type="submit">创建</button>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const API_BASE = "http://localhost:8080";
      const welcomeText = document.getElementById("welcomeText");
      const entryList = document.getElementById("entryList");
      const entryContent = document.getElementById("entryContent");
      const logoutBtn = document.getElementById("logoutBtn");
      const newEntryBtn = document.getElementById("newEntryBtn");
      const loadMoreBtn = document.getElementById("loadMoreBtn");
      const editBtn = document.getElementById("editBtn");
      const deleteBtn = document.getElementById("deleteBtn");
      const drawerToggleBtn = document.getElementById("drawerToggleBtn");
      const drawerCloseBtn = document.getElementById("drawerCloseBtn");
      const drawerBackdrop = document.getElementById("drawerBackdrop");
      const entryDrawer = document.getElementById("entryDrawer");
      const loginHistoryList = document.getElementById("loginHistoryList");
      const themeToggleBtn = document.getElementById("themeToggleBtn");
      const passkeyRegisterBtn = document.getElementById("passkeyRegisterBtn");
      const passkeyStatus = document.getElementById("passkeyStatus");
      const groupName = document.getElementById("groupName");
      const groupMeta = document.getElementById("groupMeta");
      const addTagBtn = document.getElementById("addTagBtn");
      const tagModal = document.getElementById("tagModal");
      const tagModalCloseBtn = document.getElementById("tagModalCloseBtn");
      const tagForm = document.getElementById("tagForm");
      const tagName = document.getElementById("tagName");
      const tagSlug = document.getElementById("tagSlug");
      const tagDesc = document.getElementById("tagDesc");
      const tagOrder = document.getElementById("tagOrder");
      const tagFormStatus = document.getElementById("tagFormStatus");
      const tagSubmitBtn = document.getElementById("tagSubmitBtn");

      const THEME_STORAGE_KEY = "dashboard-theme";
      let nextOffset = 0;
      let hasMore = true;
      let activeEntryId = null;

      function isMobileLayout() {
        return window.innerWidth <= 860;
      }

      function setDrawerOpen(open) {
        if (!isMobileLayout()) {
          entryDrawer.classList.remove("open");
          drawerBackdrop.classList.remove("open");
          return;
        }
        entryDrawer.classList.toggle("open", open);
        drawerBackdrop.classList.toggle("open", open);
      }

      function setActiveEntryItem() {
        const items = entryList.querySelectorAll("li[data-entry-id]");
        items.forEach((item) => {
          item.classList.toggle("active", Number(item.dataset.entryId) === activeEntryId);
        });
      }

      function applyTheme(theme) {
        const nextTheme = theme === "mono" ? "mono" : "default";
        document.documentElement.dataset.theme = nextTheme;
        localStorage.setItem(THEME_STORAGE_KEY, nextTheme);
        themeToggleBtn.textContent = nextTheme === "mono" ? "切换到默认样式" : "切换到黑白样式";
      }

      function initTheme() {
        applyTheme(localStorage.getItem(THEME_STORAGE_KEY) || "default");
      }

      function formatLocation(record) {
        const parts = [record.city, record.region, record.country].filter(Boolean);
        return parts.length > 0 ? parts.join(", ") : "位置未知";
      }

      function formatLoginMethod(method) {
        if (method === "passkey") return "Passkey";
        if (method === "register") return "注册";
        return "密码";
      }

      async function loadLoginHistory() {
        const res = await fetch(`${API_BASE}/api/login-history?limit=5`, {
          credentials: "include",
        });
        if (!res.ok) {
          loginHistoryList.innerHTML = "<li>无法加载登录记录</li>";
          return;
        }

        const data = await res.json();
        const records = data.records || [];
        if (records.length === 0) {
          loginHistoryList.innerHTML = "<li>暂无登录记录</li>";
          return;
        }

        loginHistoryList.innerHTML = records
          .map((record) => {
            const time = new Date(record.logged_in_at).toLocaleString();
            return `
              <li>
                <div class="meta-title">${record.ip_address || "未知 IP"} · ${formatLoginMethod(record.login_method)}</div>
                <div class="meta-subtitle">${formatLocation(record)}</div>
                <div class="meta-time">${time}</div>
              </li>
            `;
          })
          .join("");
      }

      async function loadProfile() {
        const res = await fetch(`${API_BASE}/api/me`, { credentials: "include" });
        if (!res.ok) {
          window.location.href = "/login.html";
          return;
        }
        const data = await res.json();
        welcomeText.textContent = `你好，${data.username}`;
        const roleLabel = data.role === "admin" ? "管理用户组" : "普通用户组";
        groupName.textContent = roleLabel;
        const isAdmin = data.role === "admin";
        groupMeta.textContent = isAdmin ? "可管理标签与内容" : "基础浏览与发帖";
        addTagBtn.disabled = !isAdmin;
        addTagBtn.textContent = isAdmin ? "添加 Tag" : "仅管理员可添加";
      }

      function openTagModal() {
        tagForm.reset();
        tagOrder.value = "0";
        tagFormStatus.textContent = "";
        tagModal.classList.add("open");
        tagModal.setAttribute("aria-hidden", "false");
        tagName.focus();
      }

      function closeTagModal() {
        tagModal.classList.remove("open");
        tagModal.setAttribute("aria-hidden", "true");
      }

      addTagBtn.addEventListener("click", () => {
        if (addTagBtn.disabled) return;
        openTagModal();
      });

      tagModalCloseBtn.addEventListener("click", closeTagModal);
      tagModal.querySelector(".modal-backdrop").addEventListener("click", closeTagModal);

      tagForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        tagFormStatus.textContent = "正在创建...";
        tagSubmitBtn.disabled = true;

        const payload = {
          name: tagName.value.trim(),
          slug: tagSlug.value.trim(),
          description: tagDesc.value.trim(),
          sort_order: Number(tagOrder.value || 0),
        };

        try {
          const res = await fetch(`${API_BASE}/api/tags`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          if (!res.ok) {
            tagFormStatus.textContent = data.error || "创建失败";
            return;
          }
          tagFormStatus.textContent = "创建成功";
          setTimeout(() => closeTagModal(), 600);
        } catch (err) {
          tagFormStatus.textContent = "创建失败，请重试";
        } finally {
          tagSubmitBtn.disabled = false;
        }
      });

      async function loadEntries(reset = false) {
        if (reset) {
          nextOffset = 0;
          hasMore = true;
          entryList.innerHTML = "";
        }

        if (!hasMore) {
          return;
        }

        const res = await fetch(`${API_BASE}/api/markdown?limit=10&offset=${nextOffset}`, {
          credentials: "include",
        });
        if (!res.ok) {
          entryList.innerHTML = "<li>无法加载记录</li>";
          return;
        }
        const data = await res.json();
        if (reset && (!data.entries || data.entries.length === 0)) {
          entryList.innerHTML = "<li>暂无记录</li>";
          hasMore = false;
          loadMoreBtn.style.display = "none";
          return;
        }

        (data.entries || []).forEach((entry) => {
          const li = document.createElement("li");
          li.dataset.entryId = entry.id;
          li.textContent = entry.title;
          li.addEventListener("click", () => loadEntry(entry.id));
          entryList.appendChild(li);
        });

        hasMore = Boolean(data.has_more);
        nextOffset = Number(data.next_offset || 0);
        loadMoreBtn.style.display = hasMore ? "inline-flex" : "none";
      }

      async function loadEntry(id) {
        const res = await fetch(`${API_BASE}/api/markdown/${id}`, { credentials: "include" });
        if (!res.ok) {
          entryContent.textContent = "读取失败";
          return;
        }
        const data = await res.json();
        activeEntryId = data.entry ? data.entry.id : null;
        setActiveEntryItem();
        const rawContent = data.content || "空内容";
        entryContent.innerHTML = window.marked ? window.marked.parse(rawContent) : rawContent;
        if (isMobileLayout()) {
          setDrawerOpen(false);
        }
      }

      logoutBtn.addEventListener("click", async () => {
        await fetch(`${API_BASE}/api/logout`, { method: "POST", credentials: "include" });
        window.location.href = "/login.html";
      });

      newEntryBtn.addEventListener("click", () => {
        window.location.href = "/editor.html";
      });

      loadMoreBtn.addEventListener("click", () => {
        loadEntries();
      });

      drawerToggleBtn.addEventListener("click", () => {
        setDrawerOpen(!entryDrawer.classList.contains("open"));
      });

      drawerCloseBtn.addEventListener("click", () => {
        setDrawerOpen(false);
      });

      drawerBackdrop.addEventListener("click", () => {
        setDrawerOpen(false);
      });

      window.addEventListener("resize", () => {
        if (!isMobileLayout()) {
          setDrawerOpen(false);
        }
      });

      editBtn.addEventListener("click", () => {
        if (!activeEntryId) {
          return;
        }
        window.location.href = `/editor.html?id=${activeEntryId}`;
      });

      deleteBtn.addEventListener("click", async () => {
        if (!activeEntryId) {
          return;
        }
        if (!confirm("确定要删除该记录吗？")) {
          return;
        }
        const res = await fetch(`${API_BASE}/api/markdown/${activeEntryId}`, {
          method: "DELETE",
          credentials: "include",
        });
        if (res.ok) {
          activeEntryId = null;
          entryContent.textContent = "请选择侧边栏中的记录";
          loadEntries(true);
        }
      });

      loadProfile();
      loadEntries(true);
      loadLoginHistory();
      initTheme();

      themeToggleBtn.addEventListener("click", () => {
        const currentTheme = document.documentElement.dataset.theme === "mono" ? "mono" : "default";
        applyTheme(currentTheme === "mono" ? "default" : "mono");
      });

      passkeyRegisterBtn.addEventListener("click", async () => {
        if (!window.PublicKeyCredential) {
          passkeyStatus.textContent = "当前浏览器不支持 Passkey。";
          return;
        }

        passkeyStatus.textContent = "正在启动 Passkey...";
        try {
          const beginRes = await fetch(`${API_BASE}/api/passkey/register/begin`, {
            method: "POST",
            credentials: "include",
          });
          const beginResult = await beginRes.json();
          if (!beginRes.ok) {
            passkeyStatus.textContent = beginResult.error || "无法发起 Passkey 绑定";
            return;
          }

          const publicKey = beginResult.publicKey;
          publicKey.challenge = base64URLToBuffer(publicKey.challenge);
          publicKey.user.id = base64URLToBuffer(publicKey.user.id);
          if (publicKey.excludeCredentials) {
            publicKey.excludeCredentials = publicKey.excludeCredentials.map((cred) => ({
              ...cred,
              id: base64URLToBuffer(cred.id),
            }));
          }

          const credential = await navigator.credentials.create({ publicKey });
          const payload = credentialToJSON(credential);

          const finishRes = await fetch(`${API_BASE}/api/passkey/register/finish`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-Passkey-Session": beginResult.session_id,
            },
            credentials: "include",
            body: JSON.stringify(payload),
          });
          const finishResult = await finishRes.json();

          if (finishRes.ok) {
            passkeyStatus.textContent = "Passkey 绑定成功！";
          } else {
            passkeyStatus.textContent = finishResult.error || "Passkey 绑定失败";
          }
        } catch (err) {
          passkeyStatus.textContent = "网络错误，请重试";
        }
      });

      function base64URLToBuffer(value) {
        const padding = "=".repeat((4 - (value.length % 4)) % 4);
        const base64 = (value + padding).replace(/-/g, "+").replace(/_/g, "/");
        const raw = atob(base64);
        const buffer = new Uint8Array(raw.length);
        for (let i = 0; i < raw.length; i++) {
          buffer[i] = raw.charCodeAt(i);
        }
        return buffer;
      }

      function bufferToBase64URL(buffer) {
        const bytes = new Uint8Array(buffer);
        let binary = "";
        for (let i = 0; i < bytes.byteLength; i++) {
          binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
      }

      function credentialToJSON(credential) {
        if (!credential) return null;
        const obj = {
          id: credential.id,
          rawId: bufferToBase64URL(credential.rawId),
          type: credential.type,
          response: {
            clientDataJSON: bufferToBase64URL(credential.response.clientDataJSON),
          },
        };

        if (credential.response.attestationObject) {
          obj.response.attestationObject = bufferToBase64URL(credential.response.attestationObject);
        }
        if (credential.response.authenticatorData) {
          obj.response.authenticatorData = bufferToBase64URL(credential.response.authenticatorData);
        }
        if (credential.response.signature) {
          obj.response.signature = bufferToBase64URL(credential.response.signature);
        }
        if (credential.response.userHandle) {
          obj.response.userHandle = bufferToBase64URL(credential.response.userHandle);
        }
        return obj;
      }
    </script>
  </body>
</html>
