<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>帖子详情</title>
    <link rel="icon" type="image/svg+xml" href="/assets/polaris-logo.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="posts-page">
      <div class="dashboard-header">
        <div>
          <h1>帖子详情</h1>
          <p id="postWelcome">正在加载...</p>
        </div>
        <div class="header-actions">
          <a class="btn-inline btn-secondary" href="/posts.html">返回帖子广场</a>
        </div>
      </div>

      <div id="postDetail" class="post-detail panel"></div>

      <div class="panel post-form-panel">
        <div class="badge">发布新帖</div>
        <form id="postForm" class="post-form">
          <label class="form-label" for="postContent">内容</label>
          <textarea id="postContent" class="input textarea" rows="4" placeholder="分享你的想法..." required></textarea>

          <label class="form-label" for="postImages">图片（可选，支持多选）</label>
          <input id="postImages" class="input" type="file" accept="image/*" multiple />

          <label class="form-label" for="postVideos">视频（可选，支持多选）</label>
          <input id="postVideos" class="input" type="file" accept="video/*" multiple />

          <div id="postFormStatus" class="status-text"></div>
          <div class="post-form-actions">
            <button id="postSubmitBtn" class="btn-secondary" type="submit">发布</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      const API_BASE = "http://localhost:8080";
      const postWelcome = document.getElementById("postWelcome");
      const postDetail = document.getElementById("postDetail");
      const postForm = document.getElementById("postForm");
      const postContent = document.getElementById("postContent");
      const postImages = document.getElementById("postImages");
      const postVideos = document.getElementById("postVideos");
      const postFormStatus = document.getElementById("postFormStatus");
      const postSubmitBtn = document.getElementById("postSubmitBtn");
      const THEME_STORAGE_KEY = "app-theme";

      function applyTheme(theme) {
        const nextTheme = theme === "mono" ? "mono" : "default";
        document.documentElement.dataset.theme = nextTheme;
        return nextTheme;
      }

      function initTheme() {
        applyTheme(localStorage.getItem(THEME_STORAGE_KEY) || "default");
      }

      function bindThemeSync() {
        window.addEventListener("storage", (event) => {
          if (event.key === THEME_STORAGE_KEY) {
            applyTheme(event.newValue || "default");
          }
        });
      }

      initTheme();
      bindThemeSync();

      let activePost = null;
      let currentUserId = "";
      let videoModal = null;
      let videoModalPlayer = null;

      function getPostId() {
        const params = new URLSearchParams(window.location.search);
        return params.get("id");
      }

      function buildAssetUrl(url) {
        if (!url) return "";
        if (url.startsWith("http://") || url.startsWith("https://")) return url;
        return `${API_BASE}${url}`;
      }

      function makeDefaultAvatar(name) {
        const canvas = document.createElement("canvas");
        canvas.width = 64;
        canvas.height = 64;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#38bdf8";
        ctx.font = "bold 28px SF Mono, Fira Code, monospace";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText((name || "U").trim().charAt(0).toUpperCase(), canvas.width / 2, canvas.height / 2);
        return canvas.toDataURL("image/png");
      }

      function resolveAvatar(name, iconUrl) {
        return iconUrl ? buildAssetUrl(iconUrl) : makeDefaultAvatar(name);
      }

      function formatTime(value) {
        return new Date(value).toLocaleString();
      }

      function ensureVideoModal() {
        if (videoModal) return;
        const modal = document.createElement("div");
        modal.className = "video-modal";
        modal.innerHTML = `
          <div class="video-modal-backdrop"></div>
          <div class="video-modal-content panel">
            <button class="video-modal-close btn-inline btn-secondary" type="button">关闭</button>
            <video class="video-modal-player" controls autoplay preload="metadata"></video>
          </div>
        `;
        document.body.appendChild(modal);
        videoModal = modal;
        videoModalPlayer = modal.querySelector(".video-modal-player");

        const close = () => {
          if (!videoModal) return;
          videoModal.classList.remove("open");
          if (videoModalPlayer) {
            videoModalPlayer.pause();
            videoModalPlayer.removeAttribute("src");
            videoModalPlayer.load();
          }
        };

        modal.querySelector(".video-modal-backdrop").addEventListener("click", close);
        modal.querySelector(".video-modal-close").addEventListener("click", close);
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") close();
        });
      }

      function openVideoModal(url) {
        if (!url) return;
        ensureVideoModal();
        videoModalPlayer.src = url;
        videoModal.classList.add("open");
        videoModalPlayer.play().catch(() => {});
      }

      async function loadProfile() {
        const res = await fetch(`${API_BASE}/api/me`, { credentials: "include" });
        if (!res.ok) {
          window.location.href = "/login.html";
          return;
        }
        const data = await res.json();
        currentUserId = data.user_id;
        postWelcome.textContent = `你好，${data.username}`;
      }

      async function loadPost() {
        const postId = getPostId();
        if (!postId) {
          postDetail.innerHTML = "<div class='post-empty'>无效的帖子</div>";
          return;
        }
        const res = await fetch(`${API_BASE}/api/posts/${postId}`, {
          credentials: "include",
        });
        if (!res.ok) {
          postDetail.innerHTML = "<div class='post-empty'>无法加载帖子</div>";
          return;
        }
        const data = await res.json();
        const post = data.post;
        if (!post) {
          postDetail.innerHTML = "<div class='post-empty'>未找到帖子</div>";
          return;
        }
        activePost = post;
        renderPost(post);
        await loadReplies(post.id);
      }

      function renderPost(post) {
        const images = (post.images || [])
          .map((url) => `<img src="${buildAssetUrl(url)}" alt="post image" />`)
          .join("");
        const videos = (post.videos || [])
          .map(
            (url) => `
              <video controls preload="metadata">
                <source src="${buildAssetUrl(url)}" />
                你的浏览器不支持 video 标签
              </video>
            `
          )
          .join("");
        const videoSection = videos ? `<div class="post-videos">${videos}</div>` : "";

        const isSelf = currentUserId && post.user_id === currentUserId;
        const authorLabel = isSelf
          ? `<span class="post-author-name">${post.username}</span>`
          : `<a class="post-author-name chat-link" href="/chat.html?user_id=${encodeURIComponent(
              post.user_id
            )}&username=${encodeURIComponent(post.username)}">${post.username}</a>`;

        const avatar = resolveAvatar(post.username, post.user_icon);

        postDetail.innerHTML = `
          <div class="post-header">
            <div class="post-author">
              <img class="avatar-sm" src="${avatar}" alt="${post.username}" />
              ${authorLabel}
            </div>
            <div class="post-time">${formatTime(post.created_at)}</div>
          </div>
          <div class="post-content">${post.content}</div>
          <div class="post-images">${images}</div>
          ${videoSection}
          <div class="post-actions">
            <button id="detailLikeBtn" class="btn-inline btn-secondary" type="button">
              ${post.liked_by_me ? "已点赞" : "点赞"} · ${post.like_count}
            </button>
          </div>
          <div class="reply-box open">
            <div class="reply-list" id="replyList"></div>
            <form id="replyForm" class="reply-form">
              <input id="replyInput" class="input reply-input" type="text" placeholder="写下你的回复..." required />
              <button class="btn-inline btn-secondary" type="submit">发送</button>
            </form>
          </div>
        `;

        const likeBtn = document.getElementById("detailLikeBtn");
        const videoEls = postDetail.querySelectorAll(".post-videos video");

        videoEls.forEach((videoEl) => {
          videoEl.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            const src = videoEl.currentSrc || videoEl.querySelector("source")?.src || "";
            videoEl.pause();
            openVideoModal(src);
          });
        });

        likeBtn.addEventListener("click", async () => {
          const method = post.liked_by_me ? "DELETE" : "POST";
          const res = await fetch(`${API_BASE}/api/posts/${post.id}/like`, {
            method,
            credentials: "include",
          });
          if (!res.ok) return;
          post.liked_by_me = !post.liked_by_me;
          post.like_count += post.liked_by_me ? 1 : -1;
          likeBtn.textContent = `${post.liked_by_me ? "已点赞" : "点赞"} · ${post.like_count}`;
        });

        const replyForm = document.getElementById("replyForm");
        const replyInput = document.getElementById("replyInput");
        replyForm.addEventListener("submit", async (event) => {
          event.preventDefault();
          const content = replyInput.value.trim();
          if (!content) return;
          const res = await fetch(`${API_BASE}/api/posts/${post.id}/replies`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ content }),
          });
          if (!res.ok) return;
          replyInput.value = "";
          await loadReplies(post.id);
        });
      }

      async function loadReplies(postId) {
        const replyList = document.getElementById("replyList");
        if (!replyList) return;
        replyList.innerHTML = "<div class='reply-empty'>加载中...</div>";
        const res = await fetch(`${API_BASE}/api/posts/${postId}/replies?limit=50`, {
          credentials: "include",
        });
        if (!res.ok) {
          replyList.innerHTML = "<div class='reply-empty'>无法加载回复</div>";
          return;
        }
        const data = await res.json();
        const replies = data.replies || [];
        if (replies.length === 0) {
          replyList.innerHTML = "<div class='reply-empty'>暂无回复</div>";
          return;
        }
        replyList.innerHTML = replies
          .map((reply) => {
            const avatar = resolveAvatar(reply.username, reply.user_icon);
            return `
              <div class="reply-item">
                <img class="avatar-xs" src="${avatar}" alt="${reply.username}" />
                <div class="reply-body">
                  <div class="reply-meta">${reply.username} · ${formatTime(reply.created_at)}</div>
                  <div class="reply-content">${reply.content}</div>
                </div>
              </div>
            `;
          })
          .join("");
      }

      postForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const content = postContent.value.trim();
        if (!content) {
          postFormStatus.textContent = "内容不能为空";
          return;
        }
        postFormStatus.textContent = "正在发布...";
        postSubmitBtn.disabled = true;

        const formData = new FormData();
        formData.append("content", content);
        Array.from(postImages.files).forEach((file) => {
          formData.append("images", file);
        });
        Array.from(postVideos.files || []).forEach((file) => {
          formData.append("videos", file);
        });

        try {
          const res = await fetch(`${API_BASE}/api/posts`, {
            method: "POST",
            credentials: "include",
            body: formData,
          });
          const data = await res.json();
          if (!res.ok) {
            postFormStatus.textContent = data.error || "发布失败";
            return;
          }
          postFormStatus.textContent = "发布成功";
          postForm.reset();
          window.location.href = `/post.html?id=${data.id}`;
        } catch (err) {
          postFormStatus.textContent = "发布失败，请重试";
        } finally {
          postSubmitBtn.disabled = false;
        }
      });

      async function init() {
        await loadProfile();
        await loadPost();
      }

      init();
    </script>
  </body>
</html>
