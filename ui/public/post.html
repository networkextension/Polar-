<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>帖子详情</title>
    <link rel="icon" type="image/svg+xml" href="/assets/polaris-logo.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="site-shell">
    <div class="page-shell-wide">
      <a class="site-brand-banner" href="/dashboard.html" data-site-brand>
        <img class="site-brand-icon" data-site-icon alt="站点图标" />
        <div class="site-brand-copy">
          <div class="site-brand-name" data-site-name>Polar-</div>
          <div class="site-brand-description" data-site-description>正在加载站点信息...</div>
        </div>
      </a>

      <div class="posts-page">
      <div class="dashboard-header">
        <div>
          <h1>帖子详情</h1>
          <p id="postWelcome">正在加载...</p>
        </div>
        <div class="header-actions">
          <a class="btn-inline btn-secondary" href="/posts.html">返回帖子广场</a>
        </div>
      </div>

      <div id="postDetail" class="post-detail panel"></div>

      <div class="panel post-form-panel">
        <div class="badge">发布新帖</div>
        <form id="postForm" class="post-form">
          <label class="form-label" for="postType">类型</label>
          <select id="postType" class="input">
            <option value="standard">普通帖子</option>
            <option value="task">零工任务</option>
          </select>

          <label class="form-label" for="postContent">内容</label>
          <textarea id="postContent" class="input textarea" rows="4" placeholder="分享你的想法..." required></textarea>

          <div id="taskFields" class="task-form-fields" hidden>
            <label class="form-label" for="taskLocation">地理位置（可选）</label>
            <input id="taskLocation" class="input" type="text" placeholder="如：上海徐汇 / 远程" />

            <div class="task-form-grid">
              <div>
                <label class="form-label" for="taskStartAt">开始时间</label>
                <input id="taskStartAt" class="input" type="datetime-local" />
              </div>
              <div>
                <label class="form-label" for="taskEndAt">结束时间</label>
                <input id="taskEndAt" class="input" type="datetime-local" />
              </div>
            </div>

            <label class="form-label" for="workingHours">Working hours</label>
            <input id="workingHours" class="input" type="text" placeholder="如：4h / 9:00-13:00 / 周末两天" />

            <label class="form-label" for="applyDeadline">申请截止时间</label>
            <input id="applyDeadline" class="input" type="datetime-local" />
          </div>

          <label class="form-label" for="postImages">图片（可选，支持多选）</label>
          <input id="postImages" class="input" type="file" accept="image/*" multiple />

          <label class="form-label" for="postVideos">视频（可选，支持多选）</label>
          <input id="postVideos" class="input" type="file" accept="video/*" multiple />

          <div id="postFormStatus" class="status-text"></div>
          <div class="post-form-actions">
            <button id="postSubmitBtn" class="btn-secondary" type="submit">发布</button>
          </div>
        </form>
      </div>
      </div>
    </div>

    <script type="module" src="/scripts/post.js"></script>
  </body>
</html>
