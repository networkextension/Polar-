<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-title="posts.title">Posts Square</title>
    <link rel="icon" type="image/svg+xml" href="/assets/polaris-logo.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="lp-page">
    <div class="lp-app">
      <aside class="lp-sidebar">
        <a class="lp-brand" href="/dashboard.html" data-site-brand>
          <img data-site-icon alt="" />
          <span class="lp-brand-name" data-site-name>Polar-</span>
        </a>
        <nav class="lp-nav">
          <a class="lp-nav-item" href="/dashboard.html">
            <span class="lp-nav-icon">⊞</span><span>Dashboard</span>
          </a>
          <a class="lp-nav-item active" href="/posts.html">
            <span class="lp-nav-icon">◎</span><span>Posts</span>
          </a>
          <a class="lp-nav-item" href="/markdowns.html">
            <span class="lp-nav-icon">◈</span><span>Markdowns</span>
          </a>
          <a class="lp-nav-item" href="/chat.html">
            <span class="lp-nav-icon">◉</span><span>Chat</span>
          </a>
          <a class="lp-nav-item" href="/editor.html">
            <span class="lp-nav-icon">✎</span><span>Editor</span>
          </a>
          <a class="lp-nav-item" href="/latch.html" hidden data-admin-nav>
            <span class="lp-nav-icon">⚙</span><span data-i18n="nav.latch">Latch</span>
          </a>
          <a class="lp-nav-item" href="/dashboard.html?settings=bots" hidden data-admin-nav>
            <span class="lp-nav-icon">◉</span><span data-i18n="nav.bots">Bot Management</span>
          </a>
          <a class="lp-nav-item" href="/admin.html" hidden data-admin-nav>
            <span class="lp-nav-icon">☍</span><span data-i18n="nav.userAdmin">用户管理</span>
          </a>
        </nav>
        <div class="lp-sidebar-foot">
          <div class="lp-foot-avatar" id="lpFootAvatar">U</div>
          <div class="lp-foot-info">
            <div class="lp-foot-name" id="lpFootName">—</div>
            <div class="lp-foot-role" id="lpFootRole">—</div>
          </div>
        </div>
      </aside>

      <div class="lp-main">
        <div class="lp-topbar">
          <span class="lp-topbar-title" data-i18n="posts.title">Posts Square</span>
          <div class="lp-topbar-end">
            <span id="postWelcome" class="lp-mode-badge" data-i18n="posts.loading">Loading...</span>
            <a class="lp-topbar-back" href="/post.html" data-i18n="posts.newPost">＋ New Post</a>
            <a class="lp-topbar-back" href="/markdowns.html" data-i18n="posts.publicMarkdowns">Markdowns</a>
          </div>
        </div>

        <div class="lp-content">
          <div class="lp-section">
            <div class="lp-section-head">
              <div class="lp-filter-bar">
                <div id="postTypeFilters" style="display:contents"></div>
                <div id="tagFilters" style="display:contents"></div>
              </div>
            </div>
            <div id="postListBadge" class="lp-section-badge" data-i18n="posts.latestPosts">Latest posts</div>
            <div id="postList" class="lp-feed"></div>
            <button id="postLoadMoreBtn" class="lp-manage-btn" type="button" style="margin-top:12px;" data-i18n="posts.loadMore">Load more</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/scripts/posts.js"></script>
  </body>
</html>
