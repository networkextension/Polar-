<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>帖子广场</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="posts-page">
      <div class="dashboard-header">
        <div>
          <h1>帖子广场</h1>
          <p id="postWelcome">正在加载用户信息...</p>
        </div>
        <div class="header-actions">
          <a class="btn-inline btn-secondary" href="/dashboard.html">返回控制台</a>
          <a class="btn-inline btn-secondary" href="/post.html">发帖</a>
        </div>
      </div>

      <div class="posts-list">
        <div class="badge">最新帖子</div>
        <div id="postList" class="post-list"></div>
        <button id="postLoadMoreBtn" class="btn-inline btn-secondary" type="button">加载更多</button>
      </div>
    </div>

    <script>
      const API_BASE = "http://localhost:8080";
      const postWelcome = document.getElementById("postWelcome");
      const postList = document.getElementById("postList");
      const postLoadMoreBtn = document.getElementById("postLoadMoreBtn");

      let nextOffset = 0;
      let hasMore = true;
      let currentUserId = "";

      function buildAssetUrl(url) {
        if (!url) return "";
        if (url.startsWith("http://") || url.startsWith("https://")) return url;
        return `${API_BASE}${url}`;
      }

      function formatTime(value) {
        return new Date(value).toLocaleString();
      }

      async function loadProfile() {
        const res = await fetch(`${API_BASE}/api/me`, { credentials: "include" });
        if (!res.ok) {
          window.location.href = "/login.html";
          return;
        }
        const data = await res.json();
        currentUserId = data.user_id;
        postWelcome.textContent = `你好，${data.username}，发布你的第一篇帖子吧。`;
      }

      function renderReplies(container, replies) {
        if (!replies || replies.length === 0) {
          container.innerHTML = "<div class='reply-empty'>暂无回复</div>";
          return;
        }
        container.innerHTML = replies
          .map((reply) => {
            return `
              <div class="reply-item">
                <div class="reply-meta">${reply.username} · ${formatTime(reply.created_at)}</div>
                <div class="reply-content">${reply.content}</div>
              </div>
            `;
          })
          .join("");
      }

      async function loadReplies(postId, container) {
        container.innerHTML = "<div class='reply-empty'>加载中...</div>";
        const res = await fetch(`${API_BASE}/api/posts/${postId}/replies?limit=50`, {
          credentials: "include",
        });
        if (!res.ok) {
          container.innerHTML = "<div class='reply-empty'>无法加载回复</div>";
          return;
        }
        const data = await res.json();
        renderReplies(container, data.replies || []);
      }

      function createPostCard(post) {
        const card = document.createElement("div");
        card.className = "post-card panel";

        const images = (post.images || [])
          .map((url) => `<img src="${buildAssetUrl(url)}" alt="post image" />`)
          .join("");

        const isSelf = currentUserId && post.user_id === currentUserId;
        const authorLabel = isSelf
          ? `<span class="post-author-name">${post.username}</span>`
          : `<a class="post-author-name chat-link" href="/chat.html?user_id=${encodeURIComponent(
              post.user_id
            )}&username=${encodeURIComponent(post.username)}">${post.username}</a>`;

        card.innerHTML = `
          <div class="post-header">
            <div class="post-author">${authorLabel}</div>
            <div class="post-time">${formatTime(post.created_at)}</div>
          </div>
          <div class="post-content">${post.content}</div>
          <div class="post-images">${images}</div>
          <div class="post-actions">
            <button class="btn-inline btn-secondary like-btn" type="button">
              ${post.liked_by_me ? "已点赞" : "点赞"} · ${post.like_count}
            </button>
            <a class="btn-inline btn-secondary" href="/post.html?id=${post.id}">查看详情</a>
          </div>
        `;

        const likeBtn = card.querySelector(".like-btn");

        likeBtn.addEventListener("click", async () => {
          const method = post.liked_by_me ? "DELETE" : "POST";
          const res = await fetch(`${API_BASE}/api/posts/${post.id}/like`, {
            method,
            credentials: "include",
          });
          if (!res.ok) return;
          post.liked_by_me = !post.liked_by_me;
          post.like_count += post.liked_by_me ? 1 : -1;
          likeBtn.textContent = `${post.liked_by_me ? "已点赞" : "点赞"} · ${post.like_count}`;
        });

        return card;
      }

      async function loadPosts(reset = false) {
        if (reset) {
          nextOffset = 0;
          hasMore = true;
          postList.innerHTML = "";
        }
        if (!hasMore) return;

        const res = await fetch(`${API_BASE}/api/posts?limit=10&offset=${nextOffset}`, {
          credentials: "include",
        });
        if (!res.ok) {
          postList.innerHTML = "<div class='post-empty'>无法加载帖子</div>";
          return;
        }
        const data = await res.json();
        const posts = data.posts || [];
        if (reset && posts.length === 0) {
          postList.innerHTML = "<div class='post-empty'>暂无帖子</div>";
          hasMore = false;
          postLoadMoreBtn.style.display = "none";
          return;
        }

        posts.forEach((post) => {
          postList.appendChild(createPostCard(post));
        });

        hasMore = data.has_more;
        nextOffset = data.next_offset;
        postLoadMoreBtn.style.display = hasMore ? "inline-flex" : "none";
      }

      postLoadMoreBtn.addEventListener("click", () => loadPosts(false));

      async function init() {
        await loadProfile();
        await loadPosts(true);
      }

      init();
    </script>
  </body>
</html>
