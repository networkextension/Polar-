<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>注册</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="card">
      <h1>创建账户</h1>
      <p>快速注册并开始体验</p>
      <div id="alert" class="alert"></div>
      <form id="registerForm">
        <label for="username">用户名</label>
        <input id="username" name="username" type="text" required minlength="3" placeholder="johndoe" />
        <label for="email">邮箱</label>
        <input id="email" name="email" type="email" required placeholder="you@example.com" />
        <label for="password">密码</label>
        <input id="password" name="password" type="password" required minlength="6" placeholder="至少6位" />
        <button type="submit">注册</button>
      </form>
      <a class="link" href="/login.html">已有账户？去登录</a>
    </div>

    <script>
      const API_BASE = "http://localhost:8080";
      const form = document.getElementById("registerForm");
      const alertBox = document.getElementById("alert");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        alertBox.className = "alert";
        alertBox.textContent = "";

        const payload = {
          username: form.username.value.trim(),
          email: form.email.value.trim(),
          password: form.password.value,
        };

        try {
          const res = await fetch(`${API_BASE}/api/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify(payload),
          });
          const data = await res.json();

          if (!res.ok) {
            alertBox.className = "alert error";
            alertBox.textContent = data.error || "注册失败";
            return;
          }

          alertBox.className = "alert success";
          alertBox.textContent = "注册成功，正在跳转...";
          setTimeout(() => {
            window.location.href = "/dashboard.html";
          }, 600);
        } catch (err) {
          alertBox.className = "alert error";
          alertBox.textContent = "网络错误，请稍后重试";
        }
      });
    </script>
  </body>
</html>
