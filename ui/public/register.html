<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-title="register.title">Register</title>
    <link rel="icon" type="image/svg+xml" href="/assets/polaris-logo.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="site-shell">
    <div class="page-shell-narrow">
      <a class="site-brand-banner" href="/" data-site-brand>
        <img class="site-brand-icon" data-site-icon alt="Site icon" />
        <div class="site-brand-copy">
          <div class="site-brand-name" data-site-name>Polar-</div>
          <div class="site-brand-description" data-site-description data-i18n="brand.loading">Loading site info...</div>
        </div>
      </a>

      <div class="card">
        <h1 data-i18n="register.heading">Create account</h1>
        <p data-i18n="register.subtitle">Sign up to get started</p>
        <div id="alert" class="alert"></div>
        <form id="registerForm">
          <label for="username" data-i18n="register.username">Username</label>
          <input id="username" name="username" type="text" required minlength="3" placeholder="johndoe" />
          <label for="email" data-i18n="register.email">Email</label>
          <input id="email" name="email" type="email" required placeholder="you@example.com" />
          <label for="password" data-i18n="register.password">Password</label>
          <input id="password" name="password" type="password" required minlength="6" data-i18n-placeholder="register.passwordPlaceholder" placeholder="At least 6 characters" />
          <div id="inviteCodeWrap" hidden>
            <label for="invitation_code" data-i18n="register.inviteCode">Invite code</label>
            <input id="invitation_code" name="invitation_code" type="text" maxlength="24" data-i18n-placeholder="register.inviteCodePlaceholder" placeholder="Enter invite code" />
            <p class="drawer-help" data-i18n="register.inviteCodeHelp">Registration on this site currently requires a valid invite code.</p>
          </div>
          <button type="submit" data-i18n="register.submit">Register</button>
        </form>
        <a class="link" href="/login.html" data-i18n="register.hasAccount">Already have an account? Log in</a>
      </div>
    </div>

    <script type="module" src="/scripts/register.js"></script>
  </body>
</html>
