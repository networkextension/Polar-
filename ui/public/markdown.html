<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-title="markdown.title">Public Markdown</title>
    <link rel="icon" type="image/svg+xml" href="/assets/polaris-logo.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="lp-page">
    <div class="lp-app">
      <aside class="lp-sidebar">
        <a class="lp-brand" href="/dashboard.html" data-site-brand>
          <img data-site-icon alt="" />
          <span class="lp-brand-name" data-site-name>Polar-</span>
        </a>
        <nav class="lp-nav">
          <a class="lp-nav-item" href="/dashboard.html">
            <span class="lp-nav-icon">⊞</span><span>Dashboard</span>
          </a>
          <a class="lp-nav-item" href="/posts.html">
            <span class="lp-nav-icon">◎</span><span>Posts</span>
          </a>
          <a class="lp-nav-item active" href="/markdowns.html">
            <span class="lp-nav-icon">◈</span><span>Markdowns</span>
          </a>
          <a class="lp-nav-item" href="/chat.html">
            <span class="lp-nav-icon">◉</span><span>Chat</span>
          </a>
          <a class="lp-nav-item" href="/editor.html">
            <span class="lp-nav-icon">✎</span><span>Editor</span>
          </a>
          <a class="lp-nav-item" href="/latch.html" hidden data-admin-nav>
            <span class="lp-nav-icon">⚙</span><span>Latch</span>
          </a>
          <a class="lp-nav-item" href="/admin.html" hidden data-admin-nav>
            <span class="lp-nav-icon">☍</span><span>用户管理</span>
          </a>
        </nav>
        <div class="lp-sidebar-foot">
          <div class="lp-foot-avatar" id="lpFootAvatar">U</div>
          <div class="lp-foot-info">
            <div class="lp-foot-name" id="lpFootName">—</div>
            <div class="lp-foot-role" id="lpFootRole">—</div>
          </div>
        </div>
      </aside>

      <div class="lp-main">
        <div class="lp-topbar">
          <span id="markdownTitle" class="lp-topbar-title" data-i18n="markdown.title">Public Markdown</span>
          <div class="lp-topbar-end">
            <span id="markdownMeta" class="lp-mode-badge" data-i18n="markdown.readOnlyPreview">Read-only preview</span>
            <a class="lp-topbar-back" href="/login.html" data-i18n="markdown.loginToEdit">Log in to edit</a>
          </div>
        </div>

        <div class="lp-content">
          <div id="markdownAlert" class="alert"></div>
          <div id="markdownContent" class="panel content-box" data-i18n="markdown.loading">Loading content...</div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="/scripts/markdown.js"></script>
  </body>
</html>
