<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-title="markdown.title">Public Markdown</title>
    <link rel="icon" type="image/svg+xml" href="/assets/polaris-logo.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="site-shell">
    <div class="page-shell-wide">
      <a class="site-brand-banner" href="/" data-site-brand>
        <img class="site-brand-icon" data-site-icon alt="Site icon" />
        <div class="site-brand-copy">
          <div class="site-brand-name" data-site-name>Polar-</div>
          <div class="site-brand-description" data-site-description data-i18n="brand.loading">Loading site info...</div>
        </div>
      </a>

      <div class="dashboard">
        <div class="dashboard-header">
          <div>
            <h1 id="markdownTitle" data-i18n="markdown.title">Public Markdown</h1>
            <p id="markdownMeta" data-i18n="markdown.readOnlyPreview">Read-only preview</p>
          </div>
          <a class="btn-inline btn-secondary" href="/login.html" data-i18n="markdown.loginToEdit">Log in to edit your own documents</a>
        </div>

        <div id="markdownAlert" class="alert"></div>
        <div id="markdownContent" class="panel content-box" data-i18n="markdown.loading">Loading content...</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="/scripts/markdown.js"></script>
  </body>
</html>
