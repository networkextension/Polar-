<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-title="markdowns.title">Public Markdowns</title>
    <link rel="icon" type="image/svg+xml" href="/assets/polaris-logo.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="site-shell">
    <div class="page-shell-wide">
      <a class="site-brand-banner" href="/" data-site-brand>
        <img class="site-brand-icon" data-site-icon alt="Site icon" />
        <div class="site-brand-copy">
          <div class="site-brand-name" data-site-name>Polar-</div>
          <div class="site-brand-description" data-site-description data-i18n="brand.loading">Loading site info...</div>
        </div>
      </a>

      <div class="posts-page">
        <div class="dashboard-header">
          <div>
            <h1 data-i18n="markdowns.title">Public Markdowns</h1>
            <p id="markdownsWelcome" data-i18n="markdowns.browse">Browse all publicly published documents</p>
          </div>
          <div class="header-actions">
            <a class="btn-inline btn-secondary" href="/dashboard.html" data-i18n="markdowns.backToDashboard">Back to Dashboard</a>
          </div>
        </div>

        <div class="posts-list">
          <div class="badge" data-i18n="markdowns.latestBadge">Latest public documents</div>
          <div id="markdownList" class="markdown-list"></div>
          <button id="markdownLoadMoreBtn" class="btn-inline btn-secondary" type="button" data-i18n="markdowns.loadMore">Load more</button>
        </div>
      </div>
    </div>

    <script type="module" src="/scripts/markdowns.js"></script>
  </body>
</html>
