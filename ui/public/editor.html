<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown 编辑器</title>
    <link rel="icon" type="image/svg+xml" href="/assets/polaris-logo.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="dashboard">
      <div class="dashboard-header">
        <div>
          <h1>Markdown 编辑器</h1>
          <p id="welcomeText">新建一条记录</p>
        </div>
        <button id="backBtn" class="btn-inline btn-secondary" type="button">返回控制台</button>
      </div>

      <div id="alert" class="alert"></div>

      <div class="panel">
        <div class="toolbar">
          <input id="titleInput" type="text" placeholder="标题" />
          <button id="saveBtn" class="btn-inline" type="button">保存</button>
        </div>
        <div class="grid">
          <div>
            <textarea id="contentInput" placeholder="在这里输入 Markdown 内容..."></textarea>
          </div>
          <div>
            <div class="badge">预览（原文）</div>
            <div id="preview" class="content-box">暂无内容</div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const API_BASE = "http://localhost:8080";
      const alertBox = document.getElementById("alert");
      const titleInput = document.getElementById("titleInput");
      const contentInput = document.getElementById("contentInput");
      const preview = document.getElementById("preview");
      const saveBtn = document.getElementById("saveBtn");
      const backBtn = document.getElementById("backBtn");
      const params = new URLSearchParams(window.location.search);
      const entryId = params.get("id");

      async function ensureLogin() {
        const res = await fetch(`${API_BASE}/api/me`, { credentials: "include" });
        if (!res.ok) {
          window.location.href = "/login.html";
        }
      }

      async function loadEntry() {
        if (!entryId) {
          return;
        }
        const res = await fetch(`${API_BASE}/api/markdown/${entryId}`, { credentials: "include" });
        if (!res.ok) {
          alertBox.className = "alert error";
          alertBox.textContent = "无法加载记录";
          return;
        }
        const data = await res.json();
        titleInput.value = data.entry ? data.entry.title : "";
        contentInput.value = data.content || "";
        renderPreview();
        document.getElementById("welcomeText").textContent = "编辑记录";
      }

      function renderPreview() {
        const raw = contentInput.value.trim();
        if (!raw) {
          preview.textContent = "暂无内容";
          return;
        }
        preview.innerHTML = window.marked ? window.marked.parse(raw) : raw;
      }

      contentInput.addEventListener("input", () => {
        renderPreview();
      });

      saveBtn.addEventListener("click", async () => {
        alertBox.className = "alert";
        alertBox.textContent = "";

        const title = titleInput.value.trim();
        const content = contentInput.value.trim();

        if (!title || !content) {
          alertBox.className = "alert error";
          alertBox.textContent = "标题和内容不能为空";
          return;
        }

        try {
          const targetUrl = entryId ? `${API_BASE}/api/markdown/${entryId}` : `${API_BASE}/api/markdown`;
          const method = entryId ? "PUT" : "POST";
          const res = await fetch(targetUrl, {
            method,
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ title, content }),
          });
          const data = await res.json();

          if (!res.ok) {
            alertBox.className = "alert error";
            alertBox.textContent = data.error || "保存失败";
            return;
          }

          alertBox.className = "alert success";
          alertBox.textContent = entryId ? "更新成功" : `保存成功（ID: ${data.id}）`;
          window.location.href = "/dashboard.html";
        } catch (err) {
          alertBox.className = "alert error";
          alertBox.textContent = "网络错误，请稍后重试";
        }
      });

      backBtn.addEventListener("click", () => {
        window.location.href = "/dashboard.html";
      });

      ensureLogin();
      loadEntry();
    </script>
  </body>
</html>
