<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-title="editor.heading">Markdown Editor</title>
    <link rel="icon" type="image/svg+xml" href="/assets/polaris-logo.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="lp-page">
    <div class="lp-app">
      <aside class="lp-sidebar">
        <a class="lp-brand" href="/dashboard.html" data-site-brand>
          <img data-site-icon alt="" />
          <span class="lp-brand-name" data-site-name>Polar-</span>
        </a>
        <nav class="lp-nav">
          <a class="lp-nav-item" href="/dashboard.html">
            <span class="lp-nav-icon">⊞</span><span>Dashboard</span>
          </a>
          <a class="lp-nav-item" href="/posts.html">
            <span class="lp-nav-icon">◎</span><span>Posts</span>
          </a>
          <a class="lp-nav-item" href="/markdowns.html">
            <span class="lp-nav-icon">◈</span><span>Markdowns</span>
          </a>
          <a class="lp-nav-item" href="/chat.html">
            <span class="lp-nav-icon">◉</span><span>Chat</span>
          </a>
          <a class="lp-nav-item" href="/creation.html">
            <span class="lp-nav-icon">✍</span><span data-i18n="nav.creation">Creation</span>
          </a>
          <a class="lp-nav-item active" href="/editor.html">
            <span class="lp-nav-icon">✎</span><span>Editor</span>
          </a>
          <a class="lp-nav-item" href="/latch.html" hidden data-admin-nav>
            <span class="lp-nav-icon">⚙</span><span data-i18n="nav.latch">Latch</span>
          </a>
          <a class="lp-nav-item" href="/bots.html" hidden data-admin-nav>
            <span class="lp-nav-icon">◉</span><span data-i18n="nav.bots">Bot Management</span>
          </a>
          <a class="lp-nav-item" href="/admin.html" hidden data-admin-nav>
            <span class="lp-nav-icon">☍</span><span data-i18n="nav.userAdmin">用户管理</span>
          </a>
        </nav>
        <div class="lp-sidebar-foot">
          <div class="lp-foot-avatar" id="lpFootAvatar">U</div>
          <div class="lp-foot-info">
            <div class="lp-foot-name" id="lpFootName">—</div>
            <div class="lp-foot-role" id="lpFootRole">—</div>
          </div>
          <div class="lp-sidebar-foot-actions">
            <button class="lp-foot-icon-btn" type="button" data-open-settings-center data-settings-target="personalization" title="Settings" data-i18n-tooltip="nav.settings">⚙</button>
            <button id="logoutBtn" class="lp-foot-icon-btn" type="button" title="Log out">⏻</button>
          </div>
        </div>
      </aside>

      <div class="lp-main">
        <div class="lp-topbar">
          <span class="lp-topbar-title" data-i18n="editor.heading">Markdown Editor</span>
          <div class="lp-topbar-end">
            <span id="welcomeText" class="lp-mode-badge" data-i18n="editor.newEntry">New entry</span>
            <button id="previewToggleBtn" class="btn-chip" type="button" data-i18n="editor.previewToggle">Preview</button>
            <button id="assistToggleBtn" class="btn-chip" type="button" data-i18n="editor.assistToggle">AI Polish</button>
            <button id="saveBtn" class="btn-chip btn-chip-primary" type="button" data-i18n="editor.save">Save</button>
            <button id="backBtn" class="lp-topbar-back" type="button" data-i18n="editor.backToDashboard">Dashboard</button>
          </div>
        </div>

        <div class="lp-content">
          <div id="alert" class="alert"></div>

          <div class="lp-section editor-focus">
            <div class="toolbar">
              <input id="titleInput" type="text" data-i18n-placeholder="editor.titlePlaceholder" placeholder="Title" />
            </div>
            <div class="editor-options">
              <label class="checkbox-label" for="publicToggle">
                <input id="publicToggle" type="checkbox" />
                <span data-i18n="editor.publicLabel">Public (others can view but not edit)</span>
              </label>
              <div id="publicHint" class="status-text" data-i18n="editor.publicByDefault">Visible only to you by default.</div>
            </div>
            <div class="editor-main">
              <textarea id="contentInput" data-i18n-placeholder="editor.contentPlaceholder" placeholder="Enter Markdown content here..."></textarea>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- AI Polish drawer. Hidden by default; opened from the topbar
         "AI Polish" button. Slides in from the right so the user can
         keep editing while polishing runs and apply / diff in place. -->
    <aside id="assistDrawer" class="editor-drawer" hidden>
      <header class="editor-drawer-head">
        <span class="badge" data-i18n="editor.assistTitle">Bot polish</span>
        <button id="assistDrawerClose" class="editor-drawer-close" type="button" aria-label="Close">×</button>
      </header>
      <div class="editor-drawer-body">
        <label class="form-label" for="assistBotSelect" data-i18n="editor.assistBot">Bot</label>
        <select id="assistBotSelect" class="input"></select>
        <label class="form-label" for="assistLLMSelect" data-i18n="editor.assistLLM">Model (optional)</label>
        <select id="assistLLMSelect" class="input"></select>
        <label class="form-label" for="assistInstructionInput" data-i18n="editor.assistInstruction">Instruction (optional)</label>
        <textarea id="assistInstructionInput" class="input textarea" rows="3" data-i18n-placeholder="editor.assistInstructionPlaceholder" placeholder="可选：写本次润色要求，例如“更专业、更简洁、保留原观点”"></textarea>
        <div class="editor-drawer-actions">
          <button id="assistRunBtn" class="btn-chip btn-chip-primary" type="button" data-i18n="editor.assistRun">Polish</button>
          <button id="assistApplyBtn" class="btn-chip" type="button" disabled data-i18n="editor.assistApply">Apply</button>
          <button id="assistDiffBtn" class="btn-chip" type="button" disabled data-i18n="editor.assistDiff">Diff</button>
        </div>
        <div id="assistStatus" class="status-text"></div>
        <div class="form-label" data-i18n="editor.assistResult">Polished result</div>
        <div id="assistPreview" class="content-box" data-i18n="editor.assistNoResult">No polished result yet</div>
        <div id="assistDiff" class="content-box" hidden data-i18n="editor.assistNoDiff">No diff yet</div>
      </div>
    </aside>

    <!-- Preview modal. Hidden by default; opened from the topbar
         "Preview" button. ESC or click on the backdrop closes. -->
    <div id="previewModal" class="editor-modal" hidden>
      <div class="editor-modal-backdrop" data-modal-close></div>
      <div class="editor-modal-card" role="dialog" aria-modal="true">
        <header class="editor-modal-head">
          <span class="badge" data-i18n="editor.previewBadge">Preview</span>
          <button id="previewModalClose" class="editor-drawer-close" type="button" aria-label="Close">×</button>
        </header>
        <div id="preview" class="content-box editor-modal-body markdown-body" data-i18n="editor.noContent">No content</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="/scripts/editor.js"></script>
  </body>
</html>
