<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-title="editor.heading">Markdown Editor</title>
    <link rel="icon" type="image/svg+xml" href="/assets/polaris-logo.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="site-shell">
    <div class="page-shell-wide">
      <a class="site-brand-banner" href="/dashboard.html" data-site-brand>
        <img class="site-brand-icon" data-site-icon alt="Site icon" />
        <div class="site-brand-copy">
          <div class="site-brand-name" data-site-name>Polar-</div>
          <div class="site-brand-description" data-site-description data-i18n="brand.loading">Loading site info...</div>
        </div>
      </a>

      <div class="dashboard">
      <div class="dashboard-header">
        <div>
          <h1 data-i18n="editor.heading">Markdown Editor</h1>
          <p id="welcomeText" data-i18n="editor.newEntry">New entry</p>
        </div>
        <button id="backBtn" class="btn-inline btn-secondary" type="button" data-i18n="editor.backToDashboard">Back to Dashboard</button>
      </div>

      <div id="alert" class="alert"></div>

      <div class="panel">
        <div class="toolbar">
          <input id="titleInput" type="text" data-i18n-placeholder="editor.titlePlaceholder" placeholder="Title" />
          <button id="saveBtn" class="btn-inline" type="button" data-i18n="editor.save">Save</button>
        </div>
        <div class="editor-options">
          <label class="checkbox-label" for="publicToggle">
            <input id="publicToggle" type="checkbox" />
            <span data-i18n="editor.publicLabel">Public (others can view but not edit)</span>
          </label>
          <div id="publicHint" class="status-text" data-i18n="editor.publicByDefault">Visible only to you by default.</div>
        </div>
        <div class="grid">
          <div>
            <textarea id="contentInput" data-i18n-placeholder="editor.contentPlaceholder" placeholder="Enter Markdown content here..."></textarea>
          </div>
          <div>
            <div class="badge" data-i18n="editor.previewBadge">Preview (original)</div>
            <div id="preview" class="content-box" data-i18n="editor.noContent">No content</div>
          </div>
        </div>
      </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="/scripts/editor.js"></script>
  </body>
</html>
