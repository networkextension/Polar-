<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auth UI</title>
    <link rel="icon" type="image/svg+xml" href="/assets/polaris-logo.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="card">
      <h1>Gin Auth UI</h1>
      <p id="statusText">正在检查登录状态...</p>
      <a class="link" href="/login.html">登录</a>
      <a class="link" href="/register.html">注册</a>
      <a class="link" href="/editor.html">新建 Markdown</a>
    </div>

    <script>
      const statusText = document.getElementById("statusText");

      async function bootstrap() {
        try {
          const res = await fetch("/api/me", { credentials: "include" });
          if (res.ok) {
            window.location.replace("/dashboard.html");
            return;
          }
        } catch (err) {
        }
        statusText.textContent = "请选择操作";
      }

      bootstrap();
    </script>
  </body>
</html>
