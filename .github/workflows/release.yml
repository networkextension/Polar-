name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    env:
      BIN_PATH: cmd/dock
      BINARY_NAME: dock_amd64_freebsd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Build freebsd/amd64 binary
        run: |
          set -euo pipefail
          GOOS=freebsd GOARCH=amd64 go build -o "$BINARY_NAME" ./$BIN_PATH

      - name: Prepare package
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF_NAME}
          PKG_DIR="dist/${VERSION}/freebsd_amd64"
          mkdir -p "$PKG_DIR"
          mv "$BINARY_NAME" "$PKG_DIR/" || true
          cp LICENSE README.md "$PKG_DIR/" || true
          TAR_NAME="polar-${VERSION}-freebsd-amd64.tar.gz"
          tar -czf "$TAR_NAME" -C "dist/${VERSION}" freebsd_amd64
          sha256sum "$TAR_NAME" > "$TAR_NAME.sha256"
          ls -la "$TAR_NAME" "$TAR_NAME.sha256"
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload tar.gz asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: polar-${{ github.ref_name }}-freebsd-amd64.tar.gz
          asset_name: polar-${{ github.ref_name }}-freebsd-amd64.tar.gz
          asset_content_type: application/gzip

      - name: Upload sha256 asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: polar-${{ github.ref_name }}-freebsd-amd64.tar.gz.sha256
          asset_name: polar-${{ github.ref_name }}-freebsd-amd64.tar.gz.sha256
          asset_content_type: text/plain

      - name: Cleanup workspace
        run: |
          rm -rf dist