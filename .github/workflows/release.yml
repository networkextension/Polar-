name: Release (debug)

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Publish Release (debug)
    runs-on: ubuntu-latest
    env:
      BIN_PATH: cmd/dock
      BINARY_NAME: dock_amd64_freebsd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Build UI
        run: |
          set -euo pipefail
          cd ui
          npm install
          npm run build
          cd ..
          echo "UI built successfully"
          # Verify TypeScript build output
          if [ ! -d "ui/dist" ]; then
            echo "ERROR: UI dist directory not found"
            exit 1
          fi
          echo "UI dist contents:"
          ls -la ui/dist/

      - name: Debug info
        run: |
          set -euo pipefail
          echo "=== go version ==="
          go version
          echo "=== go env ==="
          go env
          echo "=== pwd and ls ==="
          pwd
          ls -la
          echo "=== ls cmd/dock ==="
          ls -la cmd/dock || true

      - name: Download modules
        run: |
          set -euo pipefail
          if [ -f go.mod ]; then
            echo "go.mod found, downloading modules..."
            go mod download
          else
            echo "No go.mod found; building may fail if module mode expected"
          fi

      - name: Build freebsd/amd64 binary (verbose)
        run: |
          set -euo pipefail
          echo "Building: GOOS=freebsd GOARCH=amd64 CGO_ENABLED=0 go build -v -x -o \"$BINARY_NAME\" ./$BIN_PATH"
          GOOS=freebsd GOARCH=amd64 CGO_ENABLED=0 go build -v -x -o "$BINARY_NAME" ./$BIN_PATH || {
            echo "go build failed; printing cmd/dock tree and files:"
            ls -R cmd/dock || true
            exit 1
          }
          echo "Build finished. checking binary..."
          if [ ! -f "$BINARY_NAME" ]; then
            echo "ERROR: expected binary $BINARY_NAME not found in $(pwd)"
            ls -la
            exit 1
          fi
          file "$BINARY_NAME" || true
          ls -lh "$BINARY_NAME"

      - name: Prepare package
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF_NAME}
          PKG_DIR="dist/${VERSION}/freebsd_amd64"
          mkdir -p "$PKG_DIR"
          mv "$BINARY_NAME" "$PKG_DIR/"
          cp LICENSE README.md "$PKG_DIR/" || true
          # Include UI if built
          if [ -d "ui/dist" ]; then
            cp -r "ui/dist" "$PKG_DIR/ui"
          fi
          TAR_NAME="polar-${VERSION}-freebsd-amd64.tar.gz"
          tar -czf "$TAR_NAME" -C "dist/${VERSION}" freebsd_amd64
          sha256sum "$TAR_NAME" > "$TAR_NAME.sha256"
          ls -la "$TAR_NAME" "$TAR_NAME.sha256"

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            polar-${{ github.ref_name }}-freebsd-amd64.tar.gz
            polar-${{ github.ref_name }}-freebsd-amd64.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to existing Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            polar-${{ github.event.release.tag_name }}-freebsd-amd64.tar.gz
            polar-${{ github.event.release.tag_name }}-freebsd-amd64.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup workspace
        run: |
          rm -rf dist
