name: Release (debug)

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Publish Release (debug)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      BIN_PATH: cmd/dock
      BINARY_NAME: dock_${{ matrix.arch }}_${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: freebsd
            arch: amd64
          - os: linux
            arch: arm64
          - os: linux
            arch: amd64
          - os: darwin
            arch: arm64
          - os: darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Build UI
        run: |
          set -euo pipefail
          cd ui
          npm install
          npm run build
          cd ..
          echo "UI built successfully"
          # Verify TypeScript build output
          if [ ! -d "ui/dist" ]; then
            echo "ERROR: UI dist directory not found"
            exit 1
          fi
          echo "UI dist contents:"
          ls -la ui/dist/

      - name: Debug info
        run: |
          set -euo pipefail
          echo "=== go version ==="
          go version
          echo "=== go env ==="
          go env
          echo "=== pwd and ls ==="
          pwd
          ls -la
          echo "=== ls cmd/dock ==="
          ls -la cmd/dock || true

      - name: Download modules
        run: |
          set -euo pipefail
          if [ -f go.mod ]; then
            echo "go.mod found, downloading modules..."
            go mod download
          else
            echo "No go.mod found; building may fail if module mode expected"
          fi

      - name: Build ${{ matrix.os }}/${{ matrix.arch }} binary (verbose)
        run: |
          set -euo pipefail
          echo "Building: GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} CGO_ENABLED=0 go build -v -x -ldflags \"-X gin-auth-app/internal/app/dock.version=${GITHUB_REF_NAME}\" -o \"$BINARY_NAME\" ./$BIN_PATH"
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} CGO_ENABLED=0 go build -v -x -ldflags "-X gin-auth-app/internal/app/dock.version=${GITHUB_REF_NAME}" -o "$BINARY_NAME" ./$BIN_PATH || {
            echo "go build failed; printing cmd/dock tree and files:"
            ls -R cmd/dock || true
            exit 1
          }
          echo "Build finished. checking binary..."
          if [ ! -f "$BINARY_NAME" ]; then
            echo "ERROR: expected binary $BINARY_NAME not found in $(pwd)"
            ls -la
            exit 1
          fi
          file "$BINARY_NAME" || true
          ls -lh "$BINARY_NAME"

      - name: Prepare package
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF_NAME}
          PKG_DIR="dist/${VERSION}/${{ matrix.os }}_${{ matrix.arch }}"
          mkdir -p "$PKG_DIR"
          mv "$BINARY_NAME" "$PKG_DIR/"
          cp LICENSE README.md update.sh "$PKG_DIR/" || true
          cp scripts/db_init.sql "$PKG_DIR/" || true
          cp -r migrations "$PKG_DIR/" || true
          # Include UI if built
          if [ -d "ui/dist" ]; then
            cp -r "ui/dist" "$PKG_DIR/ui"
          fi
          TAR_NAME="polar-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"
          tar -czf "$TAR_NAME" -C "dist/${VERSION}" ${{ matrix.os }}_${{ matrix.arch }}
          sha256sum "$TAR_NAME" > "$TAR_NAME.sha256"
          ls -la "$TAR_NAME" "$TAR_NAME.sha256"

      - name: Create GitHub Release
        if: github.event_name == 'push' && matrix.os == 'freebsd' && matrix.arch == 'amd64'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || github.event.release.tag_name }}
          files: |
            polar-${{ github.event_name == 'push' && github.ref_name || github.event.release.tag_name }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
            polar-${{ github.event_name == 'push' && github.ref_name || github.event.release.tag_name }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup workspace
        run: |
          rm -rf dist
